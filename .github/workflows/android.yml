name: Build Android APK

on:
  push:
    branches: [ main ]
    paths:
      - 'index.html'
      - 'manifest.json'
      - 'icon-*.png'
      - 'android/**'
      - 'package.json'
      - 'scripts/**'
      - 'capacitor.config.json'
      - '.github/workflows/android.yml'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"
          yes | sdkmanager --licenses || true

      - name: Install dependencies
        run: npm install

      - name: Copy web assets and sync Capacitor
        run: npm run sync

      - name: Build debug APK
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk gps-tracker.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: gps-tracker-debug-apk
          path: gps-tracker.apk
          if-no-files-found: error

      - name: Publish APK to Release (download direto)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-latest
          name: APK mais recente (debug)
          body: |
            APK de debug do GPS Tracker, gerado automaticamente a cada push na main.
            Baixe o `gps-tracker.apk` abaixo direto no celular Android e instale
            (permita "instalar de fontes desconhecidas"). Ao rastrear, aceite a
            localização como "Permitir o tempo todo".
          files: gps-tracker.apk

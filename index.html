<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>GPS Tracker - Distância Percorrida</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GPS Tracker">
<meta name="mobile-web-app-capable" content="yes">
<style>
  :root {
    color-scheme: light dark;
    --bg: #0f172a;
    --card: #1e293b;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --accent: #22c55e;
    --accent-dark: #16a34a;
    --danger: #ef4444;
    --danger-dark: #dc2626;
    --border: #334155;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 16px;
  }
  main {
    width: 100%;
    max-width: 480px;
  }
  h1 {
    font-size: 1.3rem;
    text-align: center;
    margin: 8px 0 20px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 16px;
  }
  .card h2 {
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--muted);
    margin: 0 0 12px;
  }
  .row {
    display: flex;
    justify-content: space-between;
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
    font-size: 0.95rem;
  }
  .row:last-child { border-bottom: none; }
  .row span:first-child { color: var(--muted); }
  .row span:last-child { font-weight: 600; text-align: right; }
  .big-stat {
    text-align: center;
    padding: 12px 0;
  }
  .big-stat .value {
    font-size: 2.4rem;
    font-weight: 700;
    color: var(--accent);
  }
  .big-stat .label {
    font-size: 0.85rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  button {
    width: 100%;
    padding: 14px;
    font-size: 1rem;
    font-weight: 600;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    margin-bottom: 10px;
    transition: opacity 0.15s;
  }
  button:active { opacity: 0.8; }
  button:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }
  .btn-primary { background: var(--accent); color: #052e16; }
  .btn-danger { background: var(--danger); color: #450a0a; }
  .btn-secondary {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border);
  }
  #status {
    text-align: center;
    font-size: 0.85rem;
    color: var(--muted);
    margin-bottom: 12px;
    min-height: 1.2em;
  }
  #status.error { color: var(--danger); }
  #status.tracking { color: var(--accent); }
  .dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent);
    margin-right: 6px;
    animation: pulse 1.2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
</style>
</head>
<body>
<main>
  <h1>📍 GPS Tracker</h1>

  <div id="status">Aguardando...</div>

  <div class="card">
    <h2>Posição Atual</h2>
    <div class="row"><span>Latitude</span><span id="lat">—</span></div>
    <div class="row"><span>Longitude</span><span id="lon">—</span></div>
    <div class="row"><span>Precisão</span><span id="acc">—</span></div>
    <div class="row"><span>Última atualização</span><span id="time">—</span></div>
  </div>

  <button id="btnGet" class="btn-secondary">Obter Posição Atual</button>

  <div class="card big-stat">
    <div class="value" id="distance">0 m</div>
    <div class="label">Distância Percorrida</div>
  </div>

  <div class="card">
    <div class="row"><span>Tempo decorrido</span><span id="elapsed">00:00:00</span></div>
    <div class="row"><span>Velocidade atual</span><span id="speed">—</span></div>
    <div class="row"><span>Velocidade média</span><span id="avgSpeed">—</span></div>
  </div>

  <button id="btnStart" class="btn-primary">Iniciar Rastreamento</button>
  <button id="btnStop" class="btn-danger" disabled>Encerrar Rastreamento</button>
</main>

<script>
(() => {
  const $ = (id) => document.getElementById(id);

  const statusEl = $('status');
  const latEl = $('lat'), lonEl = $('lon'), accEl = $('acc'), timeEl = $('time');
  const distanceEl = $('distance'), elapsedEl = $('elapsed');
  const speedEl = $('speed'), avgSpeedEl = $('avgSpeed');
  const btnGet = $('btnGet'), btnStart = $('btnStart'), btnStop = $('btnStop');

  let watchId = null;
  let lastPos = null;
  let totalDistance = 0;
  let startTime = null;
  let elapsedTimer = null;

  const R = 6371000; // raio da Terra em metros
  const MAX_ACCURACY_M = 20; // descarta leituras com precisão pior que isso para o cálculo de distância
  const COARSE_ACCURACY_M = 200; // acima disso é quase certamente localização aproximada (rede/Wi-Fi), não GPS

  function haversine(lat1, lon1, lat2, lon2) {
    const toRad = (d) => d * Math.PI / 180;
    const dLat = toRad(lat2 - lat1);
    const dLon = toRad(lon2 - lon1);
    const a = Math.sin(dLat / 2) ** 2 +
              Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
              Math.sin(dLon / 2) ** 2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
  }

  function formatDistance(m) {
    return m < 1000 ? `${m.toFixed(1)} m` : `${(m / 1000).toFixed(3)} km`;
  }

  function formatElapsed(ms) {
    const s = Math.floor(ms / 1000);
    const hh = String(Math.floor(s / 3600)).padStart(2, '0');
    const mm = String(Math.floor((s % 3600) / 60)).padStart(2, '0');
    const ss = String(s % 60).padStart(2, '0');
    return `${hh}:${mm}:${ss}`;
  }

  function setStatus(msg, kind) {
    statusEl.textContent = msg;
    statusEl.className = kind || '';
  }

  function renderPosition(pos) {
    const { latitude, longitude, accuracy, speed } = pos.coords;
    latEl.textContent = latitude.toFixed(6);
    lonEl.textContent = longitude.toFixed(6);
    accEl.textContent = `${accuracy.toFixed(1)} m`;
    timeEl.textContent = new Date(pos.timestamp).toLocaleTimeString('pt-BR');
    if (speed !== null && !Number.isNaN(speed)) {
      speedEl.textContent = `${(speed * 3.6).toFixed(1)} km/h`;
    }
  }

  function checkSupport() {
    if (!('geolocation' in navigator)) {
      setStatus('Geolocalização não é suportada neste navegador.', 'error');
      btnGet.disabled = true;
      btnStart.disabled = true;
      return false;
    }
    if (!window.isSecureContext) {
      setStatus('Este app precisa ser aberto via HTTPS (ou localhost) para acessar o GPS.', 'error');
      btnGet.disabled = true;
      btnStart.disabled = true;
      return false;
    }
    return true;
  }

  function geoErrorMessage(err) {
    switch (err.code) {
      case err.PERMISSION_DENIED: return 'Permissão de localização negada.';
      case err.POSITION_UNAVAILABLE: return 'Posição indisponível no momento.';
      case err.TIMEOUT: return 'Tempo esgotado ao obter a posição.';
      default: return 'Erro ao obter localização.';
    }
  }

  // Colhe várias leituras por alguns segundos e retorna a de MENOR raio de
  // erro. O primeiro fix do navegador costuma vir de IP/Wi-Fi (erro de km);
  // o GPS só "esquenta" e refina a precisão após alguns segundos de leitura.
  function acquireBestFix({ targetAccuracy = 20, maxWaitMs = 30000 } = {}) {
    return new Promise((resolve, reject) => {
      let best = null;
      let wId = null;
      let timer = null;

      const finish = () => {
        if (wId !== null) navigator.geolocation.clearWatch(wId);
        if (timer !== null) clearTimeout(timer);
        best ? resolve(best) : reject({ code: 3 }); // 3 = TIMEOUT
      };

      wId = navigator.geolocation.watchPosition(
        (pos) => {
          if (!best || pos.coords.accuracy < best.coords.accuracy) {
            best = pos;
            renderPosition(pos);
            setStatus(`Refinando precisão... (${pos.coords.accuracy.toFixed(0)} m)`);
          }
          // já bom o suficiente: encerra antes do tempo máximo
          if (pos.coords.accuracy <= targetAccuracy) finish();
        },
        (err) => {
          if (!best) {
            if (wId !== null) navigator.geolocation.clearWatch(wId);
            if (timer !== null) clearTimeout(timer);
            reject(err);
          }
        },
        { enableHighAccuracy: true, timeout: maxWaitMs, maximumAge: 0 }
      );

      timer = setTimeout(finish, maxWaitMs);
    });
  }

  btnGet.addEventListener('click', () => {
    if (!checkSupport()) return;
    btnGet.disabled = true;
    setStatus('Obtendo posição... aguarde o GPS estabilizar.');
    acquireBestFix()
      .then((pos) => {
        renderPosition(pos);
        const acc = pos.coords.accuracy;
        if (acc > COARSE_ACCURACY_M) {
          // erro em nível de cidade: o aparelho está entregando localização aproximada (rede/Wi-Fi), não GPS
          statusEl.innerHTML =
            `⚠️ Localização <b>aproximada</b> (${acc.toFixed(0)} m) — isto não é o GPS.<br>` +
            `Ative a <b>Localização Precisa</b> nas permissões do navegador e o modo de ` +
            `localização em <b>Alta precisão</b>, e teste ao ar livre.`;
          statusEl.className = 'error';
        } else if (acc > MAX_ACCURACY_M) {
          setStatus(`Precisão moderada (${acc.toFixed(0)} m). Ao ar livre ela deve melhorar.`, 'error');
        } else {
          setStatus(`Posição obtida com boa precisão (${acc.toFixed(0)} m).`);
        }
      })
      .catch((err) => setStatus(geoErrorMessage(err), 'error'))
      .finally(() => { btnGet.disabled = false; });
  });

  btnStart.addEventListener('click', () => {
    if (!checkSupport()) return;

    totalDistance = 0;
    lastPos = null;
    startTime = Date.now();
    distanceEl.textContent = formatDistance(0);
    speedEl.textContent = '—';
    avgSpeedEl.textContent = '—';

    setStatus('<span class="dot"></span> Rastreando...', 'tracking');
    statusEl.innerHTML = '<span class="dot"></span> Rastreando...';
    statusEl.className = 'tracking';

    btnStart.disabled = true;
    btnGet.disabled = true;
    btnStop.disabled = false;

    elapsedTimer = setInterval(() => {
      elapsedEl.textContent = formatElapsed(Date.now() - startTime);
      const hours = (Date.now() - startTime) / 3600000;
      if (hours > 0 && totalDistance > 0) {
        avgSpeedEl.textContent = `${(totalDistance / 1000 / hours).toFixed(1)} km/h`;
      }
    }, 1000);

    watchId = navigator.geolocation.watchPosition(
      (pos) => {
        renderPosition(pos);

        if (pos.coords.accuracy > MAX_ACCURACY_M) {
          // leitura ruim demais para confiar na distância: atualiza só o painel de posição
          return;
        }

        if (lastPos) {
          const d = haversine(
            lastPos.coords.latitude, lastPos.coords.longitude,
            pos.coords.latitude, pos.coords.longitude
          );
          // só conta como deslocamento real se superar o raio de incerteza combinado
          // dos dois pontos; abaixo disso é ruído do próprio GPS, não movimento
          const noiseThreshold = pos.coords.accuracy + lastPos.coords.accuracy;
          if (d > noiseThreshold) {
            totalDistance += d;
            distanceEl.textContent = formatDistance(totalDistance);
            lastPos = pos;
          }
        } else {
          lastPos = pos;
        }
      },
      (err) => setStatus(geoErrorMessage(err), 'error'),
      { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
    );
  });

  btnStop.addEventListener('click', () => {
    if (watchId !== null) {
      navigator.geolocation.clearWatch(watchId);
      watchId = null;
    }
    clearInterval(elapsedTimer);
    elapsedTimer = null;

    setStatus(`Rastreamento encerrado. Distância total: ${formatDistance(totalDistance)}.`);

    btnStart.disabled = false;
    btnGet.disabled = false;
    btnStop.disabled = true;
  });

  checkSupport();
})();
</script>
</body>
</html>
